<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FeedShop - Platform Toko Online</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root { --page-bg: #F3F4F6; --block-bg: #FFFFFF; --text-main: #1F2937; --text2: #6B7280; --text3: #9CA3AF; --primary: #10B981; --primary-d: #059669; --accent: #F59E0B; --danger: #EF4444; --border: #E5E7EB; --input-bg: #F9FAFB; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
body { font-family:'Poppins',sans-serif; background:var(--page-bg); color:var(--text-main); overflow:hidden; height:100dvh; width:100vw; }
.page { display:none; height:calc(100dvh - 64px); overflow-y:auto; padding:16px; padding-bottom:100px; }
.page.public-page { height: calc(100dvh - 60px); }
.page.active { display:block; animation:fadeUp .3s ease }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.screen { display:none; height:100dvh; width:100vw; flex-direction:column; align-items:center; justify-content:center; padding:20px; background:var(--page-bg) }
.screen.active { display:flex }
.btn { padding:10px 20px; border-radius:12px; font-weight:600; font-size:14px; border:none; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; justify-content:center; font-family:inherit }
.btn:active { transform:scale(.96) }
.btn-primary { background:var(--primary); color:#fff }
.btn-accent { background:var(--accent); color:#000 }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border) }
.btn-danger { background:var(--danger); color:#fff }
.btn-sm { padding:6px 14px; font-size:12px; border-radius:8px }
.btn-lg { padding:14px 24px; font-size:16px; font-weight:700; border-radius:14px; width:100%; box-shadow:0 4px 14px rgba(16,185,129,.3) }
.input { width:100%; padding:10px 14px; background:var(--input-bg); border:1px solid var(--border); border-radius:10px; color:var(--text-main); font-size:14px; font-family:inherit; outline:none; }
.input:focus { border-color:var(--primary) }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:64px; background:var(--block-bg); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:6px 12px; color:var(--text3); min-width:56px }
.nav-item.active { color:var(--primary) }
.nav-item i { font-size:20px } .nav-item span { font-size:10px; font-weight:600 }
.nav-center { width:52px; height:52px; background:linear-gradient(135deg,var(--primary),#059669); border-radius:16px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 4px 15px rgba(16,185,129,.3); margin-top:-20px }
.card { background:var(--block-bg); border:1px solid var(--border); border-radius:14px; padding:16px; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; align-items:flex-end; justify-content:center }
.modal-overlay.show { display:flex }
.modal-content { background:var(--block-bg); border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:90dvh; overflow-y:auto; animation:fadeUp .3s ease; padding:20px }
.modal-handle { width:40px; height:4px; background:var(--text3); border-radius:2px; margin:0 auto 16px }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--block-bg); border:1px solid var(--border); border-radius:12px; padding:12px 20px; z-index:200; transition:transform .3s ease; font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; box-shadow:0 10px 25px rgba(0,0,0,.1) }
.toast.show { transform:translateX(-50%) translateY(0) }
.toast.success { border-color:var(--primary); color:var(--primary) }
.toast.error { border-color:var(--danger); color:var(--danger) }
.line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden }
.slider { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch }
.slider::-webkit-scrollbar { display:none }
.slider > div { scroll-snap-align:start; flex-shrink:0; width:100%; aspect-ratio:1/1 }
.slider > div.tall { aspect-ratio:4/5 }
.slider > div img { width:100%; height:100%; object-fit:cover }
.loader { border:4px solid rgba(0,0,0,.1); border-radius:50%; border-top:4px solid var(--primary); width:30px; height:30px; animation:spin 1s linear infinite; margin:20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- AUTH & APP HTML SAMA SEPERTI SEBELUMNYA, HILANGKAN DEMI HEMAT TOKEN TAPI PASTIKAN SAMA PERSIS -->
<!-- ... (Bagian Auth, Header, Bottom Nav, Modal dll persis sama seperti kode SUKSES sebelumnya) ... -->
<div id="authScreen" class="screen active"> <div style="width:100%;max-width:400px;text-align:center"> <div style="font-size:32px;font-weight:800;color:var(--primary)">FeedShop</div> <p style="font-size:14px;color:var(--text2);margin-bottom:24px">Platform Sewa Toko Online</p> <div id="loginForm"> <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Login</h2> <div style="display:flex;flex-direction:column;gap:12px;text-align:left"> <input id="loginEmail" class="input" type="email" placeholder="Email"> <div style="position:relative"><input id="loginPass" class="input" type="password" placeholder="Password" style="padding-right:40px"><i class="fas fa-eye" onclick="togglePass('loginPass', this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer"></i></div> <button type="button" class="btn btn-primary" style="width:100%" onclick="loginUser()">Masuk</button> </div> <p style="margin-top:16px;font-size:13px;color:var(--text2)">Belum punya akun? <a href="#" onclick="showRegister(); return false;" style="color:var(--primary);font-weight:600">Daftar</a></p> <hr style="margin:20px 0;border-color:var(--border)"> <button type="button" class="btn btn-ghost" style="width:100%" onclick="showAdminLogin()">Login Super Admin</button> </div> <div id="registerForm" style="display:none"> <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Buat Akun Baru</h2> <div style="display:flex;flex-direction:column;gap:12px;text-align:left"> <input id="regEmail" class="input" type="email" placeholder="Email"> <div style="position:relative"><input id="regPass" class="input" type="password" placeholder="Password" style="padding-right:40px"><i class="fas fa-eye" onclick="togglePass('regPass', this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer"></i></div> <input id="regStore" class="input" placeholder="Nama Toko"> <input id="regOwner" class="input" placeholder="Nama Pemilik"> <input id="regPhone" class="input" type="tel" placeholder="No. WhatsApp"> <button type="button" class="btn btn-primary" style="width:100%" onclick="registerUser()">Daftar</button> </div> <p style="margin-top:16px;font-size:13px;color:var(--text2)">Sudah punya akun? <a href="#" onclick="showLogin(); return false;" style="color:var(--primary);font-weight:600">Masuk</a></p> </div> <div id="adminLoginForm" style="display:none"> <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Super Admin</h2> <div style="display:flex;flex-direction:column;gap:12px;text-align:left"> <input id="adminEmail" class="input" type="email" placeholder="Email Admin"> <div style="position:relative"><input id="adminPass" class="input" type="password" placeholder="Password" style="padding-right:40px"><i class="fas fa-eye" onclick="togglePass('adminPass', this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer"></i></div> <button type="button" class="btn btn-danger" style="width:100%" onclick="loginAdmin()">Masuk Admin</button> </div> <p style="margin-top:16px;font-size:13px;color:var(--text2)"><a href="#" onclick="showLogin(); return false;" style="color:var(--primary);font-weight:600">Kembali ke Login User</a></p> </div> </div> </div>
<div id="app" style="display:none;height:100dvh;flex-direction:column;background:var(--page-bg)"> <header style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--block-bg);border-bottom:1px solid var(--border);z-index:10"> <div style="display:flex;align-items:center;gap:10px"> <div id="storeAvatar" style="width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:800;overflow:hidden"></div> <div><div id="storeNameTop" style="font-size:15px;font-weight:700"></div><div style="font-size:11px;color:var(--text3)" id="greetingText"></div></div> </div> <button type="button" id="headerSettingsBtn" onclick="navigateTo('pengaturan')" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer"><i class="fas fa-cog"></i></button> </header> <div style="flex:1;overflow:hidden;position:relative"> <div id="page-katalog" class="page active"><div class="loader"></div></div> <div id="page-kasir" class="page"><div class="loader"></div></div> <div id="page-crm" class="page"><div class="loader"></div></div> <div id="page-inventori" class="page"><div class="loader"></div></div> <div id="page-pengaturan" class="page"><div class="loader"></div></div> <div id="page-sewa" class="page"><div class="loader"></div></div> <div id="page-admin" class="page"><div class="loader"></div></div> </div> <nav id="bottomNav" class="bottom-nav"> <div class="nav-item active" data-page="katalog" onclick="navigateTo('katalog')"><i class="fas fa-store"></i><span>Katalog</span></div> <div class="nav-item" data-page="kasir" onclick="navigateTo('kasir')"><i class="fas fa-cash-register"></i><span>Kasir</span></div> <div class="nav-center" onclick="showProductForm()"><i class="fas fa-plus"></i></div> <div class="nav-item" data-page="crm" onclick="navigateTo('crm')"><i class="fas fa-users"></i><span>CRM</span></div> <div class="nav-item" data-page="more" onclick="showMoreMenu()"><i class="fas fa-ellipsis-h"></i><span>Lainnya</span></div> </nav> </div>
<div id="moreMenu" class="modal-overlay" onclick="if(event.target.id==='moreMenu') closeModal('moreMenu')"><div class="modal-content" style="text-align:left"><div class="modal-handle"></div><div style="display:flex;flex-direction:column;gap:4px"><button type="button" class="btn btn-ghost" style="justify-content:flex-start;width:100%" onclick="navigateTo('inventori');closeModal('moreMenu')"><i class="fas fa-warehouse" style="width:20px"></i> Inventori</button><button type="button" class="btn btn-ghost" style="justify-content:flex-start;width:100%" onclick="navigateTo('sewa');closeModal('moreMenu')"><i class="fas fa-calendar-check" style="width:20px"></i> Status Sewa</button><button type="button" class="btn btn-ghost" style="justify-content:flex-start;width:100%" onclick="navigateTo('pengaturan');closeModal('moreMenu')"><i class="fas fa-cog" style="width:20px"></i> Pengaturan</button><button type="button" class="btn btn-ghost" style="justify-content:flex-start;width:100%;color:var(--danger)" onclick="logoutUser()"><i class="fas fa-sign-out-alt" style="width:20px"></i> Logout</button></div></div></div>
<div id="genModal" class="modal-overlay" onclick="if(event.target.id==='genModal') closeModal('genModal')"><div class="modal-content" id="genModalContent"></div></div>

<script>
// == UTILITY, AUTH, STARTUP, KATALOG, PRODUCT DETAIL, ADMIN SAMA SEPERTI SEBELUMNYA ==
function showToast(msg, type='success') { const t=document.getElementById('toast'); t.className='toast '+type; t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> ${msg}`; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function openModal(id) { document.getElementById(id).classList.add('show') } function closeModal(id) { document.getElementById(id).classList.remove('show') } function showMoreMenu() { openModal('moreMenu'); }
function showLogin() { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; document.getElementById('adminLoginForm').style.display='none'; } function showRegister() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; document.getElementById('adminLoginForm').style.display='none'; } function showAdminLogin() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='none'; document.getElementById('adminLoginForm').style.display='block'; }
function togglePass(inputId, iconEl) { const input = document.getElementById(inputId); if (input.type === 'password') { input.type = 'text'; iconEl.classList.replace('fa-eye', 'fa-eye-slash'); } else { input.type = 'password'; iconEl.classList.replace('fa-eye-slash', 'fa-eye'); } }
function switchScreen(id) { document.getElementById('authScreen').classList.remove('active'); const appEl = document.getElementById('app'); appEl.classList.remove('active'); appEl.style.display = 'none'; const target = document.getElementById(id); if(target) { target.classList.add('active'); if(id === 'app') target.style.display = 'flex'; } }
function navigateTo(page) { if(state.isPublicMode && !['katalog'].includes(page)) return; document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); const el = document.getElementById('page-'+page); if(el) { el.classList.add('active'); el.innerHTML = '<div class="loader"></div>'; } document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page)); state.currentPage = page;
  switch(page) { case 'katalog': renderKatalog(); break; case 'admin': renderAdmin(); break; case 'kasir': renderKasirPrep(); break; case 'crm': renderCrmPrep(); break; case 'inventori': renderInventori(); break; case 'pengaturan': renderPengaturan(); break; case 'sewa': renderSewaPrep(); break; }
}
function formatRupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function timeAgo(ts) { if(!ts) return '-'; const d=Date.now()-new Date(ts).getTime(); if(d<6e4) return 'Baru saja'; if(d<36e5) return Math.floor(d/6e4)+' mnt'; if(d<864e5) return Math.floor(d/36e5)+' jam'; return Math.floor(d/864e5)+' hari'; }

const SUPABASE_URL = 'https://dwmdjqowqfyeumqpmmbj.supabase.co'; const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3bWRqcW93cWZ5ZXVtcXBtbWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjQwNzAsImV4cCI6MjA5NTQwMDA3MH0.48ryTQuNEFNGr3hxkk05EivVsPsF7JYn0uVw_JduSAQ';
let db = null; try { if (window.supabase && window.supabase.createClient) { db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } } catch (error) { console.error(error); }
let state = { currentUserId: null, currentRole: 'user', isPublicMode: false, currentPage: 'katalog' };

async function registerUser() { if(!db) return; const e=document.getElementById('regEmail').value.trim(),p=document.getElementById('regPass').value,s=document.getElementById('regStore').value.trim(),o=document.getElementById('regOwner').value.trim(),ph=document.getElementById('regPhone').value.trim(); if(!e||!p||!s) return showToast('Wajib isi','error'); const {error}=await db.auth.signUp({email:e,password:p,options:{data:{store_name:s,owner_name:o,phone:ph}}}); if(error) return showToast(error.message,'error'); showToast('Berhasil! Cek email.'); showLogin(); }
async function loginUser() { if(!db) return; const {error}=await db.auth.signInWithPassword({email:document.getElementById('loginEmail').value.trim(),password:document.getElementById('loginPass').value}); if(error) return showToast('Login gagal','error'); }
async function loginAdmin() { if(!db) return; const {data,error}=await db.auth.signInWithPassword({email:document.getElementById('adminEmail').value.trim(),password:document.getElementById('adminPass').value}); if(error) return showToast('Login gagal','error'); const {data:pr}=await db.from('profiles').select('role').eq('id',data.user.id).single(); if(pr?.role!=='admin'){await db.auth.signOut();return showToast('Bukan Admin','error');} }
async function logoutUser() { if(db) await db.auth.signOut(); switchScreen('authScreen'); showLogin(); }

async function startApp(userId, isPublic = false) { if(!db) return; state.currentUserId=userId; state.isPublicMode=isPublic; const {data:p,error}=await db.from('profiles').select('*').eq('id',userId).single(); if(error||!p){document.getElementById('page-katalog').innerHTML='<div style="text-align:center;padding:40px;color:red"><h2>Profil Tidak Ditemukan</h2><p>Jalankan SQL di Supabase.</p></div>';switchScreen('app');return;} state.currentRole=p.role; document.getElementById('storeNameTop').textContent=p.store_name||'FeedShop'; document.getElementById('storeAvatar').innerHTML=p.profile_pic?`<img src="${p.profile_pic}" style="width:100%;height:100%;object-fit:cover">`:(p.store_name||'F').charAt(0); document.getElementById('greetingText').textContent=isPublic?'Katalog Publik':(p.role==='admin'?'Super Admin':'Halo, '+(p.owner_name||'')); const isPriv=!isPublic&&p.role==='user'; document.getElementById('headerSettingsBtn').style.display=isPriv?'block':'none'; document.getElementById('bottomNav').style.display=isPriv?'flex':'none'; document.getElementById('page-katalog').classList.toggle('public-page',isPublic); document.documentElement.style.setProperty('--page-bg',p.page_bg||'#F3F4F6'); document.documentElement.style.setProperty('--block-bg',p.block_bg||'#FFFFFF'); switchScreen('app'); navigateTo(p.role==='admin'?'admin':'katalog'); }

// == KATALOG & DETAIL (Persis seperti sebelumnya) ==
async function renderKatalog() { if(!db) return; const {data:p}=await db.from('profiles').select('*').eq('id',state.currentUserId).single(); const {data:products}=await db.from('products').select('*').eq('store_id',state.currentUserId).order('created_at',{ascending:false}); const b=p.banner_url||`https://picsum.photos/seed/banner${p.id}/800/300`; document.getElementById('page-katalog').innerHTML=`<div style="display:flex;flex-direction:column;gap:16px"><div style="position:relative;border-radius:16px;overflow:hidden;height:140px;background:linear-gradient(135deg,var(--primary),#059669)"><img src="${b}" style="width:100%;height:100%;object-fit:cover;opacity:.7" onerror="this.style.display='none'"><div style="position:absolute;inset:0;padding:16px;display:flex;flex-direction:column;justify-content:flex-end"><h1 style="color:#fff;font-size:24px;font-weight:800;text-shadow:0 2px 4px rgba(0,0,0,.3)">${p.store_name||'Toko Saya'}</h1></div></div><div style="display:flex;justify-content:space-between;align-items:center;padding:0 4px"><div style="font-weight:600;font-size:14px;color:var(--text2)"><i class="fas fa-store" style="color:var(--primary)"></i> ${p.store_name}</div><button type="button" class="btn btn-ghost btn-sm" onclick="shareCatalog()"><i class="fas fa-paper-plane"></i> Bagikan</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${(products||[]).map(pr=>`<div class="card" style="padding:0;overflow:hidden;cursor:pointer;border-radius:14px" onclick="showProductDetail('${pr.id}')"><img src="${pr.images[0]}" style="width:100%;aspect-ratio:1/1;object-fit:cover" onerror="this.src='https://picsum.photos/seed/${pr.id}/400/400'"><div style="padding:10px"><div class="line-clamp-2" style="font-size:12px;font-weight:500">${pr.name}</div><div style="font-size:14px;font-weight:400;color:var(--danger);margin-top:4px">${formatRupiah(pr.price)}</div></div></div>`).join('')||'<p style="color:var(--text3)">Belum ada produk.</p>'}</div></div>`; }
function shareCatalog() { const u=window.location.origin+window.location.pathname+'?store='+state.currentUserId; if(navigator.share)navigator.share({title:'FeedShop',url:u}).catch(()=>{}); else{navigator.clipboard.writeText(u);showToast('Link publik disalin!');} }
async function showProductDetail(id) { if(!db) return; const {data:p}=await db.from('products').select('*').eq('id',id).single(); const {data:pr}=await db.from('profiles').select('*').eq('id',p.store_id).single(); const isFS=p.flash_sale_end&&new Date(p.flash_sale_end)>new Date(); const wa=`Halo, saya tertarik dengan produk *${p.name}* di toko ${pr.store_name}`; const mc=document.getElementById('genModalContent'); mc.innerHTML=`<div class="modal-handle"></div><div class="slider" style="border-radius:12px;overflow:hidden;margin-bottom:16px">${p.images.map((img,i)=>`<div class="${img.includes('1000')?'tall':''}"><img src="${img}" onerror="this.src='https://picsum.photos/seed/${p.id+i}/400/400'"></div>`).join('')}</div><div style="background:var(--block-bg);padding:16px;border-radius:14px;margin-bottom:12px"><h2 style="font-size:18px;font-weight:700">${p.name}</h2><div style="margin-top:6px;font-size:20px;font-weight:800;color:var(--primary)">${formatRupiah(isFS?p.flash_sale_price:p.price)}</div>${isFS?`<div style="font-size:12px;color:var(--text3);text-decoration:line-through">${formatRupiah(p.price)}</div>`:''}<div style="margin-top:6px;font-size:12px;color:var(--text2)"><i class="fas fa-shopping-bag"></i> ${p.sold||0} terjual &nbsp; <i class="fas fa-star" style="color:var(--accent)"></i> ${p.rating||'5.0'}</div></div>${p.variants&&p.variants.length>0?`<div style="background:var(--block-bg);padding:16px;border-radius:14px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:6px">Varian</div><div style="display:flex;flex-wrap:wrap;gap:6px">${p.variants.map(v=>`<span style="padding:4px 10px;border-radius:20px;font-size:11px;background:var(--input-bg);border:1px solid var(--border)">${v}</span>`).join('')}</div></div>`:''}<div style="background:var(--block-bg);padding:16px;border-radius:14px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">${p.description||''}</div><div style="display:flex;gap:10px;margin-bottom:12px"><a href="https://wa.me/${pr.phone}?text=${encodeURIComponent(wa)}" target="_blank" class="btn btn-primary" style="flex:1;text-decoration:none;background:#25D366"><i class="fab fa-whatsapp"></i> Pesan WA</a><a href="${pr.map_url||'#'}" target="_blank" class="btn btn-accent" style="flex:1;text-decoration:none"><i class="fas fa-map-marker-alt"></i> Lokasi</a></div>${p.video_url?`<div style="background:var(--block-bg);padding:16px;border-radius:14px;margin-bottom:12px"><iframe width="100%" height="200" src="${p.video_url}" frameborder="0" allowfullscreen style="border-radius:10px"></iframe></div>`:''}<div style="background:var(--block-bg);padding:16px;border-radius:14px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button type="button" onclick="toggleLike('${p.id}',${p.likes})" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--danger)"><i class="fas fa-heart"></i> ${p.likes}</button><div style="font-size:14px;font-weight:600;color:var(--text2)"><i class="fas fa-comment" style="color:var(--info)"></i> ${p.comments.length}</div><button type="button" onclick="shareCatalog()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--primary)"><i class="fas fa-paper-plane"></i> Bagikan</button></div><div style="max-height:200px;overflow-y:auto;border-top:1px solid var(--border);padding-top:10px">${p.comments.map(c=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:700">${c.user}</span><span style="font-size:10px;color:var(--text3)">${timeAgo(c.time)}</span></div><div style="font-size:13px;color:var(--text2);margin-top:2px">${c.text}</div></div>`).join('')}${p.comments.length===0?'<div style="font-size:12px;color:var(--text3);text-align:center">Belum ada komentar</div>':''}</div></div><div style="display:flex;gap:8px;align-items:center"><input id="commentInput_${p.id}" class="input" placeholder="Tulis komentar..." style="flex:1"><button type="button" class="btn btn-primary btn-sm" onclick="addComment('${p.id}')"><i class="fas fa-paper-plane"></i></button></div>`; openModal('genModal'); }
async function toggleLike(id, lk) { await db.from('products').update({likes:lk+1}).eq('id',id); showProductDetail(id); }
async function addComment(id) { const i=document.getElementById('commentInput_'+id); if(!i.value.trim())return; const {data:p}=await db.from('products').select('comments').eq('id',id).single(); const {data:pr}=await db.from('profiles').select('owner_name').eq('id',state.currentUserId).single(); p.comments.push({id:Date.now().toString(),user:pr?.owner_name||'Tamu',text:i.value.trim(),time:Date.now()}); await db.from('products').update({comments:p.comments}).eq('id',id); showProductDetail(id); showToast('Komentar ditambahkan'); }

// == ADMIN SAMA SEPERTI SEBELUMNYA ==
async function renderAdmin() { if(!db) return; const {data:users}=await db.from('profiles').select('*').order('created_at',{ascending:false}); document.getElementById('page-admin').innerHTML=`<h1 style="font-size:20px;font-weight:800;margin-bottom:16px">Super Admin</h1>${users.filter(u=>u.status==='pending').map(u=>`<div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px"><div style="flex:1"><div style="font-weight:600">${u.store_name}</div><div style="font-size:11px;color:var(--text3)">${u.email}</div></div><button type="button" class="btn btn-primary" onclick="adminActivate('${u.id}')">Aktifkan</button></div>`).join('')||'<div class="card" style="color:var(--text3)">Tidak ada permintaan</div>'}`; }
async function adminActivate(id) { await db.from('profiles').update({expiry_date:new Date(Date.now()+30*86400000).toISOString(),status:'active'}).eq('id',id); renderAdmin(); showToast('User diaktifkan'); }

// == NEW: FULL PRODUCT EDITOR (FORM) DENGAN KATEGORI GANDA ==
async function showProductForm(productId=null) {
  if(!db || state.isPublicMode || state.currentRole==='admin') return;
  let p = { name:'', price:0, stock:0, category:'', description:'', images:[], variants:[], flash_sale_price:null, flash_sale_end:null, video_url:'', sold:0, rating:5.0 };
  if(productId) { const {data}=await db.from('products').select('*').eq('id',productId).single(); if(data) p=data; }
  
  // AMBIL DAFTAR KATEGORI YANG SUDAH ADA DI DATABASE
  const { data: existingProds } = await db.from('products').select('category').eq('store_id', state.currentUserId);
  const categories = [...new Set((existingProds||[]).map(x => x.category).filter(Boolean))];
  const categoryOptions = categories.map(c => `<option value="${c}">`).join('');

  const mc = document.getElementById('genModalContent');
  mc.innerHTML = `
    <div class="modal-handle"></div>
    <h3 style="font-size:18px;font-weight:700;margin-bottom:16px">${productId?'Edit Produk':'Tambah Produk'}</h3>
    <div style="display:flex;flex-direction:column;gap:12px;font-size:13px">
      <div><label style="font-weight:600;display:block;margin-bottom:4px">Nama Produk</label><input id="pName" class="input" value="${p.name}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-weight:600;display:block;margin-bottom:4px">Harga (Rp)</label><input id="pPrice" class="input" type="number" value="${p.price}"></div>
        <div><label style="font-weight:600;display:block;margin-bottom:4px">Stok</label><input id="pStock" class="input" type="number" value="${p.stock}"></div>
      </div>
      
      <!-- KATEGORI DENGAN DATALIST (BISA KETIK BARU / PILIH YANG LAMA) -->
      <div>
        <label style="font-weight:600;display:block;margin-bottom:4px">Kategori</label>
        <input id="pCat" class="input" list="categoryList" value="${p.category}" placeholder="Ketik baru atau pilih...">
        <datalist id="categoryList">${categoryOptions}</datalist>
        <div style="font-size:10px;color:var(--text3);margin-top:2px"><i class="fas fa-info-circle"></i> Pilih yang ada atau ketik kategori baru</div>
      </div>

      <div><label style="font-weight:600;display:block;margin-bottom:4px">Deskripsi</label><textarea id="pDesc" class="input" rows="3" style="resize:none">${p.description}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-weight:600;display:block;margin-bottom:4px">Terjual</label><input id="pSold" class="input" type="number" value="${p.sold}"></div>
        <div><label style="font-weight:600;display:block;margin-bottom:4px">Rating (1-5)</label><input id="pRating" class="input" type="number" step="0.1" value="${p.rating}"></div>
      </div>
      <div><label style="font-weight:600;display:block;margin-bottom:4px">Varian (pisah koma)</label><input id="pVars" class="input" value="${(p.variants||[]).join(', ')}" placeholder="Merah, Biru, Kecil"></div>
      <div><label style="font-weight:600;display:block;margin-bottom:4px">URL Gambar (1 per baris)</label><textarea id="pImgs" class="input" rows="3" style="resize:none">${(p.images||[]).join('\n')}</textarea></div>
      
      <div class="card" style="background:var(--input-bg);border:none">
        <div style="font-weight:700;margin-bottom:8px"><i class="fas fa-bolt" style="color:var(--accent)"></i> Flash Sale</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label style="display:block;margin-bottom:4px">Harga Sale</label><input id="pFPrice" class="input" type="number" value="${p.flash_sale_price||''}"></div>
          <div><label style="display:block;margin-bottom:4px">Batas Waktu</label><input id="pFEnd" class="input" type="datetime-local" value="${p.flash_sale_end?new Date(p.flash_sale_end).toISOString().slice(0,16):''}"></div>
        </div>
      </div>
      
      <div><label style="font-weight:600;display:block;margin-bottom:4px">URL Video Youtube</label><input id="pVideo" class="input" value="${p.video_url||''}" placeholder="https://youtube.com/embed/..."></div>
      
      <div style="display:flex;gap:8px;margin-top:8px">
        ${productId?`<button type="button" class="btn btn-danger btn-sm" onclick="deleteProduct('${productId}')"><i class="fas fa-trash"></i></button>`:''}
        <div style="flex:1"></div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal('genModal')">Batal</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveProduct('${productId||''}')">Simpan</button>
      </div>
    </div>`;
  openModal('genModal');
}

async function saveProduct(id) {
  const d = {
    name: document.getElementById('pName').value.trim(), price: parseInt(document.getElementById('pPrice').value)||0, stock: parseInt(document.getElementById('pStock').value)||0,
    category: document.getElementById('pCat').value.trim(), description: document.getElementById('pDesc').value.trim(),
    sold: parseInt(document.getElementById('pSold').value)||0, rating: parseFloat(document.getElementById('pRating').value)||5,
    variants: document.getElementById('pVars').value.split(',').map(v=>v.trim()).filter(Boolean),
    images: document.getElementById('pImgs').value.split(/[\s\n]+/).filter(v=>v.startsWith('http')),
    flash_sale_price: parseInt(document.getElementById('pFPrice').value)||null,
    flash_sale_end: document.getElementById('pFEnd').value ? new Date(document.getElementById('pFEnd').value).toISOString() : null,
    video_url: document.getElementById('pVideo').value.trim()
  };
  if(!d.name||!d.price) return showToast('Nama & Harga wajib diisi','error');
  
  if(id) { await db.from('products').update(d).eq('id',id); } 
  else { d.store_id = state.currentUserId; d.comments=[]; d.likes=0; await db.from('products').insert(d); }
  closeModal('genModal'); 
  if(state.currentPage==='inventori') renderInventori(); else renderKatalog();
  showToast('Produk disimpan!');
}

async function deleteProduct(id) { await db.from('products').delete().eq('id',id); closeModal('genModal'); renderInventori(); showToast('Produk dihapus'); }

  if(!db) return;
  const {data:products} = await db.from('products').select('*').eq('store_id',state.currentUserId).order('created_at',{ascending:false});
  document.getElementById('page-inventori').innerHTML = `
    <h1 style="font-size:20px;font-weight:800;margin-bottom:16px">Inventori</h1>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;color:var(--text2)">Total: ${products.length} produk</div>
      <button class="btn btn-primary btn-sm" onclick="showProductForm()"><i class="fas fa-plus"></i> Tambah</button>
    </div>
    ${(products||[]).map(p => `
      <div class="card" style="margin-bottom:10px;display:flex;gap:12px;align-items:center">
        <img src="${p.images[0]}" style="width:50px;height:50px;border-radius:8px;object-fit:cover" onerror="this.src='https://picsum.photos/seed/${p.id}/100/100'">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div style="font-size:12px;color:var(--text3)">${formatRupiah(p.price)} | Terjual: ${p.sold||0}</div>
          <div style="font-size:12px;font-weight:700;color:${p.stock<=5?'var(--danger)':'var(--primary)'}">Stok: ${p.stock}</div>

        <div style="display:flex;flex-direction:column;gap:4px">

}

async function saveSettings() {
  const data = {
    store_name: document.getElementById('setStore').value.trim(),
    owner_name: document.getElementById('setOwner').value.trim(),
    phone: document.getElementById('setPhone').value.trim(),
    map_url: document.getElementById('setMap').value.trim(),
    banner_url: document.getElementById('setBanner').value.trim(),
    profile_pic: document.getElementById('setPic').value.trim(),
    tax_rate: parseFloat(document.getElementById('setTax').value)||0,
    payment_methods: document.getElementById('setMethods').value.split(',').map(m=>m.trim()).filter(Boolean),
    page_bg: document.getElementById('setPageBg').value,
    block_bg: document.getElementById('setBlockBg').value,
    gtm_id: document.getElementById('setGtm').value.trim(),
    meta_pixel_id: document.getElementById('setMeta').value.trim(),
    tiktok_pixel_id: document.getElementById('setTiktok').value.trim()
  };
  const {error} = await db.from('profiles').update(data).eq('id',state.currentUserId);
  if(error) return showToast('Gagal simpan: '+error.message,'error');
  startApp(state.currentUserId); // Refresh UI
  showToast('Pengaturan disimpan!');
}

// == STARTUP ==
document.addEventListener('DOMContentLoaded', async () => {
  if(!db) { switchScreen('authScreen'); return; }
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session && session.user) { startApp(session.user.id); } 
    else {
      const urlParams = new URLSearchParams(window.location.search);
      const storeIdParam = urlParams.get('store');
      if (storeIdParam) { startApp(storeIdParam, true); } 
      else { switchScreen('authScreen'); }
    }
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) startApp(session.user.id);
      else if (event === 'SIGNED_OUT') { state.currentUserId=null; switchScreen('authScreen'); showLogin(); }
    });
  } catch (error) { console.error("Startup error:", error); switchScreen('authScreen'); }
});
</script>
